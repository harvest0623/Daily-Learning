<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            width: 200px;
            height: 200px;
            background-color: red;
            overflow: auto;
        }

        .child {
            width: 50px;
            height: 50px;
            background-color: blue;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: green;
            float: left;
        }
    </style>
</head>
<body>
    <div class="box"></div>

    <div class="parent">
        <div class="child"></div>
        <div class="child"></div>
    </div>
</body>
</html>
